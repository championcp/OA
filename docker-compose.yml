
services:
  db:
    image: postgres:15-alpine
    container_name: oa_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-oa_system}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./backend/db/init-db.js:/docker-entrypoint-initdb.d/init.js
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./backend/db/seed-data.sql:/docker-entrypoint-initdb.d/seed-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

